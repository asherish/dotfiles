# =============================================================================
# General
# =============================================================================
set -g prefix C-s
unbind C-b
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 50000
set -g status-interval 5
setw -g automatic-rename off

# True Color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Allow programs to pass through escape sequences (needed for image previews)
set -g allow-passthrough on
set -ga update-environment TERM_PROGRAM

# =============================================================================
# Key bindings
# =============================================================================
bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Popup launchers ---------------------------------------------------------
bind t display-popup -d "#{pane_current_path}" -w 80% -h 60% -E "$SHELL"

# --- IDE tool switching (left pane :.1) --------------------------------------
bind e run-shell '~/.tmux/ide-switch.sh nvim'
bind y run-shell '~/.tmux/ide-switch.sh yazi'
bind g run-shell '~/.tmux/ide-switch.sh lazygit'
bind D run-shell '~/.tmux/ide-switch.sh lazydocker'
bind b run-shell '~/.tmux/ide-switch.sh btop'

# --- IDE tool selector menu --------------------------------------------------
bind Tab display-menu -T "IDE Tools" \
    " nvim"       e 'run-shell "~/.tmux/ide-switch.sh nvim"' \
    " yazi"       y 'run-shell "~/.tmux/ide-switch.sh yazi"' \
    " lazygit"    g 'run-shell "~/.tmux/ide-switch.sh lazygit"' \
    " lazydocker" D 'run-shell "~/.tmux/ide-switch.sh lazydocker"' \
    " btop"       b 'run-shell "~/.tmux/ide-switch.sh btop"'

# --- vim-tmux-navigator (inline) ---------------------------------------------
# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# =============================================================================
# Copy mode (vi style)
# =============================================================================
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# =============================================================================
# Plugins (TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux'

# --- catppuccin --------------------------------------------------------------
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

set -g status-left "#{E:@catppuccin_status_session} "
set -gF status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"

# =============================================================================
# Initialize TPM (keep this line at the very bottom)
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'
